<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor 3D</title>
    <!-- ✅ Esta es la forma CORRECTA de cargar Model Viewer -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; height: 100vh; }
        model-viewer { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <!-- ✅ El modelo se carga desde la misma carpeta (sin problemas de CORS) -->
    <model-viewer 
        src="bcpartes.glb"
        alt="Modelo 3D"
        camera-controls
        auto-rotate>
    </model-viewer>
</body>
</html>
