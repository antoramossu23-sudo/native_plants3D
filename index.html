<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor 3D - BCPartes</title>
    <!-- Importamos el visor 3D de Google -->
    <script type="module" src="https://googleapis.com"></script>
    <style>
        /* Centra el modelo en toda la pantalla */
        body { 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background-color: #f5f5f7; 
            font-family: sans-serif;
        }
        model-viewer { 
            width: 90vw; 
            height: 80vh; 
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
    </style>
</head>
<body>

    <!-- Visor interactivo apuntando a tu archivo bcpartes.glb -->
    <model-viewer 
        src="bcpartes.glb" 
        alt="Modelo 3D de BCPartes" 
        auto-rotate 
        camera-controls 
        shadow-intensity="1.5"
        exposure="1"
        interaction-prompt="auto">
    </model-viewer>

</body>
</html>
